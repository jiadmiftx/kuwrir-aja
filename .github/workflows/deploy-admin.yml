name: Deploy Admin Panel

on:
  push:
    branches: [main]
    paths:
      - 'admin_panel/**'
      - '.github/workflows/deploy-admin.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
        working-directory: admin_panel

      - run: npx tsc -b
        working-directory: admin_panel

      - run: npm run lint
        working-directory: admin_panel

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./admin_panel
          push: true
          tags: |
            ghcr.io/jiadmiftx/kuwrir-aja/admin:latest
            ghcr.io/jiadmiftx/kuwrir-aja/admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/kuwrir-aja
            git pull
            docker compose -f deploy/docker-compose.yml pull admin
            docker compose -f deploy/docker-compose.yml up -d --no-deps admin
            docker image prune -f
