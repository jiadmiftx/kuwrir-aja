name: Firebase App Distribution

on:
  push:
    branches: [main]
    paths:
      - 'customer_app/**'
      - 'driver_app/**'
      - 'restaurant_app/**'
      - 'shared/**'
      - '.github/workflows/firebase-distribution.yml'
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      customer: ${{ steps.filter.outputs.customer }}
      driver: ${{ steps.filter.outputs.driver }}
      restaurant: ${{ steps.filter.outputs.restaurant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: &shared
              - 'shared/**'
            customer:
              - *shared
              - 'customer_app/**'
            driver:
              - *shared
              - 'driver_app/**'
            restaurant:
              - *shared
              - 'restaurant_app/**'

  customer:
    needs: changes
    if: needs.changes.outputs.customer == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
      - run: flutter pub get
        working-directory: customer_app
      - run: flutter build apk --release
        working-directory: customer_app
      - uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_CUSTOMER }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: customer_app/build/app/outputs/flutter-apk/app-release.apk

  driver:
    needs: changes
    if: needs.changes.outputs.driver == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
      - run: flutter pub get
        working-directory: driver_app
      - run: flutter build apk --release
        working-directory: driver_app
      - uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_DRIVER }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: driver_app/build/app/outputs/flutter-apk/app-release.apk

  restaurant:
    needs: changes
    if: needs.changes.outputs.restaurant == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
      - run: flutter pub get
        working-directory: restaurant_app
      - run: flutter build apk --release
        working-directory: restaurant_app
      - uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_RESTAURANT }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: restaurant_app/build/app/outputs/flutter-apk/app-release.apk
